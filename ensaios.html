<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ensaios • Gincana ENSPS 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="workspace-page rehearsals-page">
  <header class="hero">
    <nav class="topbar" aria-label="Navegação principal">
      <a href="index.html" class="brand-link" aria-label="Página geral">
        <img src="assets/logo-ensps.png" alt="Logo ENSPS">
        <span>ENSPS</span>
      </a>
      <a href="index.html">Página geral</a>
    </nav>
    <div class="hero-content-wrap">
      <div class="hero-content">
        <p class="eyebrow">Organização</p>
        <h1>Ensaios</h1>
        <p>Página focada para marcar horários e acompanhar a agenda das turmas.</p>
      </div>
    </div>
  </header>

  <main>
    <section class="section single-panel">
      <div class="section-heading">
        <span>
          <span class="eyebrow">Marcação</span>
          <span class="section-title">Agendar ensaio</span>
        </span>
      </div>

      <div class="split-workspace section-body">
        <div class="admin-shell">
          <p id="syncStatus" class="admin-sync-status">Carregando dados...</p>
          <div class="admin-panel active">
            <form id="scheduleForm" class="form-grid rehearsal-form">
              <input name="editIndex" type="hidden" value="">
              <label>Turma<select name="team" required></select></label>
              <label>Data<input name="date" type="date" required></label>
              <label>
                Horário padrão
                <select name="preset">
                  <option value="">Selecionar</option>
                  <option value="10:40|11:30">10h40-11h30</option>
                  <option value="11:30|12:30">11h30-12h30</option>
                  <option value="11:50|12:35">11h50-12h35</option>
                  <option value="14:30|16:30">14h30-16h30</option>
                </select>
              </label>
              <label>Início<input name="time" type="time" required></label>
              <label>Fim<input name="endTime" type="time"></label>
              <label>Local<input name="place" type="text" value="ENSPS"></label>
              <label class="wide">Atividade<input name="activity" type="text" placeholder="Dança típica, líderes de torcida, professores"></label>
              <button class="button primary" id="scheduleSubmit" type="submit">Agendar ensaio</button>
              <button class="button ghost" id="scheduleCancelEdit" type="button" hidden>Cancelar edição</button>
            </form>
            <div class="rehearsal-actions">
              <button class="button primary" id="saveGithubData" type="button">Salvar online</button>
            </div>
          </div>
        </div>

        <div class="schedule-board">
          <div class="schedule-board-heading">
            <span class="eyebrow">Agenda</span>
            <h2>Ensaios agendados</h2>
            <p>Acompanhe os horários marcados por turma.</p>
          </div>
          <div id="scheduleList" class="schedule-list"></div>
          <div class="table-wrap"><table id="scheduleTable"></table></div>
        </div>
      </div>
    </section>
  </main>

  <footer><strong>Gincana Socioesportiva e Cultural ENSPS 2026</strong></footer>
  <script src="app.js"></script>
</body>
</html>
